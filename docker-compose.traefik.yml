services:
  frontend:
    image: hanshino/redive_frontend
    restart: always
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${PROJECT_NAME}_frontend-secure.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.${PROJECT_NAME}_frontend-secure.entrypoints=websecure"
      - "traefik.http.routers.${PROJECT_NAME}_frontend-secure.tls=true"
      - "traefik.http.routers.${PROJECT_NAME}_frontend-secure.tls.certresolver=leresolver"
      - "traefik.http.routers.${PROJECT_NAME}_frontend-secure.priority=1"
      - "traefik.docker.network=traefik"

  bot:
    image: hanshino/redive_backend
    env_file: ./.env
    restart: always
    expose:
      - 5000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - bot_network
      - traefik
    volumes:
      - ./app/assets:/usr/src/app/assets
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${PROJECT_NAME}_bot-secure.rule=Host(`${APP_DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/webhooks`) || PathPrefix(`/bot-assets`) || PathPrefix(`/socket.io`))"
      - "traefik.http.routers.${PROJECT_NAME}_bot-secure.entrypoints=websecure"
      - "traefik.http.routers.${PROJECT_NAME}_bot-secure.tls=true"
      - "traefik.http.routers.${PROJECT_NAME}_bot-secure.tls.certresolver=leresolver"
      - "traefik.http.routers.${PROJECT_NAME}_bot-secure.priority=100"
      - "traefik.http.services.${PROJECT_NAME}_bot.loadbalancer.server.port=5000"
      - "traefik.docker.network=traefik"
    logging:
      driver: "json-file"
      options:
        max-size: "1k"
        max-file: "3"

  worker:
    image: hanshino/redive_backend
    env_file: ./.env
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - bot_network
    volumes:
      - ./app/assets:/usr/src/app/assets
    command: yarn worker
    logging:
      driver: "json-file"
      options:
        max-size: "1k"
        max-file: "3"

  mysql:
    env_file: ./.env
    image: mysql
    volumes:
      - ./migration:/docker-entrypoint-initdb.d
      - "mysql_data:/var/lib/mysql"
    restart: always
    expose:
      - "${DB_PORT}"
    networks:
      - bot_network
    logging:
      driver: "json-file"
      options:
        max-size: "1k"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "$$DB_USER", "-p$$DB_PASSWORD" ]
      timeout: 20s
      retries: 10
    environment:
      "MYSQL_DATABASE": "${DB_DATABASE}"
      "MYSQL_USER": "${DB_USER}"
      "MYSQL_PASSWORD": "${DB_USER_PASSWORD}"
      "MYSQL_ROOT_PASSWORD": "${DB_PASSWORD}"

  redis:
    image: redis:alpine
    command: "redis-server --requirepass ${REDIS_PASSWORD}"
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "1k"
        max-file: "3"
    networks:
      - bot_network
    expose:
      - "${REDIS_PORT}"

  phpmyadmin:
    depends_on:
      - mysql
    image: phpmyadmin/phpmyadmin
    restart: always
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin-secure.rule=Host(`${ADMIN_DOMAIN}`)"
      - "traefik.http.routers.admin-secure.entrypoints=websecure"
      - "traefik.http.routers.admin-secure.tls=true"
      - "traefik.http.routers.admin-secure.tls.certresolver=leresolver"
      - "traefik.docker.network=traefik"
    networks:
      - bot_network
      - traefik

networks:
  traefik:
    external: true
    name: traefik
  bot_network:

volumes:
  mysql_data:
